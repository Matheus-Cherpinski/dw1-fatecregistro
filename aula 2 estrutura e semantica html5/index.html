<!-- estrutura básica html -->
<doctype html>
  <!-- diz ao navegafor para utilizar a ultima versão do html -->
  <html lang="pt-br">
    <!-- atributo lang informa o conteúdo do site -->
    <head>
      <!-- no head irão metatags (metadados - informações do site) -->
      <meta charset="UTF-8" />
      <!-- permite apresentar uma melhor visualização em dispositivos móveis -->
      <!--  charset indica o conjunto de caracteres que o site vai usar -->
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <!-- título exibido no navegador -->
      <!-- viewport visualização da página, por padrão é 1920x1080 -->
      <!-- escala inicial 1.0 (100%) -->
      <!-- responsividade adapta a visão do site que está no pc para o celular -->
      <title>meu Website</title>
    </head>
    <!-- conteudo do site - o que o usuário irá viizualizar-->
    <body>
      <h1>Meu site</h1>
      <p>bem vindo ao meu site!</p>
    </body>
  </html>
  <!-- identação é a hierarquia das tags
 html
