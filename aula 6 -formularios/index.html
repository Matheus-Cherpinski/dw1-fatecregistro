<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de cadastro</title>
</head>
<body>
    <header>
        <h1>Formulário de Cadastro</h1>
    </header>
    <main>
        <section>
            <!-- formulário do cadastro -->
            <form action="sucesso.html" method="post">
              <!-- divisão do formulário -->
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <label for="nome">Nome:</label><br>
                    <input type="text" name="nome" id="nome" placeholder="Insira seu nome completo" placeholder="Insira seu nome completo" required><br>
                    <label for="email">Email:</label><br>
                    <input type="email" name="email" id="email" placeholder="Insira seu email" br

                    placeholder="Insira seu email" required> <br>
                    <label for="senha">Senha:</label> <br>
                    <input type="password" name="password" id="password" placeholder="insira sua senha" required><br>
                    <label for="nascimento">Data de Nascimento:</label><br>
                    <input type="date" name="nascimento" id="nascimento" required><br>
                    <label for="sexo">Sexo:</label><br>
                    <input type="radio" name="sexo" id="masculino" value="m"> Masculino
                    <input type="radio" name="sexo" id="feminino" value="f"> Feminino
                </fieldset>
                <fieldset>
                    <legend>Dados do produto</legend>
                    <label for="quantidade">Quantidade:</label> <br>
                    <input type="number" name="quantidade" id="quantidade" min="1" max="10" required>
                    <label for="cor">Cor:</label> <br>
                    <input type="color"> <br>
                    <label for="entrega">Agendar entrega para data:</label><br>
                    <input type="datetime-local"><br>
                    <label for="frete">Selecione o frete</label><br>
                    <select name="frete" id="frete">
                        <option value="pac">PAC</option>
                        <option value="sedex">Sedex</option>
                        <option value="sedex10">Sedex 10</option>
                    </select> <br> <br>
                    <label for="observações">Observações:</label> <br>
                    <textarea rows="4" cols="40" name="observações" id="observações" placeholder="Escreva aqui informações sobre o produto">
                    </textarea> <br> <br>
                      <input type="checkbox" name="termos" id="termos">
                      Li e aceito os termos de uso da plataforma
                      <br><br>
                        <a href="termos.html">

                            <button type="button">Ler os termos de uso</button> 
                            </a>
                            <br><br><hr><br>
                      <button type="submit">Enviar</button>
                      <button type="reset">limpar</button>
                </fieldset>
            </form>
        </section>
    </main>
</body>
</html>
